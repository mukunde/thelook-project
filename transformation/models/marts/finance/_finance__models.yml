version: 2

models:
  - name: fct_order_items
    description: >
      Order item-level fact table — grain: one row per (order, item) pair.
      Joins stg_shopify__order_items with dim_products (to enrich with cost
      for margin calculations). Exposes the foreign keys to dim_users,
      dim_products, dim_dates, plus the raw facts (sale_price, cost, status),
      the event timestamps, and the business calculations (net_revenue,
      gross_margin, gross_margin_rate, is_returned, is_delivered,
      days_to_delivery). Conformed to Strict Kimball — no denormalised
      dimension attributes (BI tools join the dim themselves).

    config:
      contract:
        enforced: true

    columns:
      # ─── Primary key ─────────────────────────────────────────
      - name: order_item_id
        description: Surrogate primary key of the order item, propagated from `stg_shopify__order_items.order_item_id`.
        data_type: NUMBER
        data_tests:
          - not_null
          - unique

      # ─── Foreign keys to dimensions ──────────────────────────
      - name: order_id
        description: Foreign key to the parent order (will reference `fct_orders` in a follow-up feature).
        data_type: NUMBER
        data_tests:
          - not_null

      - name: user_id
        description: Foreign key to `dim_users`. Relationships test enforced (ERROR severity).
        data_type: NUMBER
        data_tests:
          - not_null
          # Historical note: this test once surfaced ~77k FK orphans because
          # the users source had an incremental cutoff at 2023-01-01 that
          # excluded historical users. Resolved by `fix(ingestion): remove
          # cutoff on users dimension` (2026-05-21), which switched the
          # users resource to write_disposition='replace' (full-refresh of
          # the dimension on every run). Severity restored to ERROR — the
          # test now fails if any orphan reappears, signaling a regression.
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_id

      - name: product_id
        description: Foreign key to `dim_products`.
        data_type: NUMBER
        data_tests:
          - not_null
        # Relationships test deferred (see ADR or Sprint A.7 — we run it
        # against dim_products in a follow-up to validate performance first).
        # data_tests:
        #   - relationships:
        #       to: ref('dim_products')
        #       field: product_id

      - name: inventory_item_id
        description: Foreign key to the inventory unit consumed (no dimension yet — Phase 3 / Operations scope).
        data_type: NUMBER

      - name: ordered_date
        description: Foreign key to `dim_dates`, derived from `ordered_at::date`.
        data_type: DATE
        data_tests:
          - not_null

      - name: delivered_date
        description: Foreign key to `dim_dates`, derived from `delivered_at::date`. NULL until delivered.
        data_type: DATE

      # ─── Status + raw facts ──────────────────────────────────
      - name: status
        description: Item lifecycle status (Processing, Shipped, Complete, Cancelled, Returned). Drives net_revenue + is_returned.
        data_type: VARCHAR

      - name: sale_price
        description: Selling price of the item at the time of the order (USD), from the source.
        data_type: FLOAT

      - name: cost
        description: Product cost of goods (USD), looked up from `dim_products` at mart-build time. Assumed stable per product (no SCD2 yet).
        data_type: FLOAT

      # ─── Event timestamps (passthrough for time-to analyses) ──
      - name: ordered_at
        description: Timestamp the order item was placed.
        data_type: TIMESTAMP_TZ
      - name: shipped_at
        description: Timestamp the item was shipped (NULL until shipped).
        data_type: TIMESTAMP_TZ
      - name: delivered_at
        description: Timestamp the item was delivered (NULL until delivered).
        data_type: TIMESTAMP_TZ
      - name: returned_at
        description: Timestamp the item was returned (NULL unless returned).
        data_type: TIMESTAMP_TZ

      # ─── Business calculations (the heart of the fact) ────────
      - name: net_revenue
        description: >
          Revenue net of returns. `sale_price` if status != 'Returned', else 0.
          The headline metric of the Finance domain (sum across rows gives
          period net revenue).
        data_type: FLOAT

      - name: gross_margin
        description: net_revenue - cost. Negative when the item is returned (cost was incurred but no revenue captured).
        data_type: FLOAT

      - name: gross_margin_rate
        description: gross_margin / net_revenue. NULL when net_revenue = 0 (returned items) to avoid division-by-zero.
        data_type: FLOAT

      - name: is_returned
        description: TRUE if the order item was returned (status = 'Returned'). Additive (SUM gives count of returned items).
        data_type: BOOLEAN

      - name: is_delivered
        description: TRUE if delivered_at IS NOT NULL. Additive.
        data_type: BOOLEAN

      - name: days_to_delivery
        description: Number of days between ordered_at and delivered_at. NULL when not yet delivered.
        data_type: NUMBER

      # ─── Audit columns (regenerated at mart-build time) ──────────
      - name: _loaded_at
        description: Timestamp when this row was materialised into `fct_order_items`.
        data_type: TIMESTAMP_LTZ
      - name: _dbt_invocation_id
        description: Unique dbt invocation ID for the mart-build that produced this row.
        data_type: VARCHAR

  - name: fct_orders
    description: >
      Order-level aggregated fact table. Grain: one row per order.
      Aggregates fct_order_items (sum / count / avg of the cleaned facts)
      and joins stg_shopify__orders for order-level attributes (status,
      gender, event timestamps). Reuses the net_revenue definition from
      fct_order_items — that's the canonical "net of returns" metric of
      the Finance domain. fct_orders is what BI executive dashboards
      and Cube net_revenue / avg_order_value measures will query.

    config:
      contract:
        enforced: true

    columns:
      # ─── Primary key ─────────────────────────────────────────
      - name: order_id
        description: Surrogate primary key of the order, propagated from fct_order_items.
        data_type: NUMBER
        data_tests:
          - not_null
          - unique

      # ─── Foreign keys to dimensions ──────────────────────────
      - name: user_id
        description: Foreign key to `dim_users` (the customer who placed the order).
        data_type: NUMBER
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_id

      - name: ordered_date
        description: Foreign key to `dim_dates`, derived from `ordered_at::date`.
        data_type: DATE
        data_tests:
          - not_null

      - name: delivered_date
        description: Foreign key to `dim_dates`, derived from `delivered_at::date`. NULL until delivered.
        data_type: DATE

      # ─── Order-level attributes (from stg_shopify__orders) ────
      - name: status
        description: Order lifecycle status at the order level (may differ from individual item statuses in case of partial returns).
        data_type: VARCHAR
      - name: gender
        description: Gender on the order (legacy denormalized from user at the source).
        data_type: VARCHAR
      - name: ordered_at
        description: Timestamp the order was placed.
        data_type: TIMESTAMP_TZ
      - name: shipped_at
        description: Timestamp the order was shipped (NULL until shipped).
        data_type: TIMESTAMP_TZ
      - name: delivered_at
        description: Timestamp the order was delivered (NULL until delivered).
        data_type: TIMESTAMP_TZ
      - name: returned_at
        description: Timestamp the order was returned (NULL unless returned).
        data_type: TIMESTAMP_TZ

      # ─── Aggregated counts ───────────────────────────────────
      - name: items_count
        description: Number of items in the order (COUNT of fct_order_items rows for this order_id).
        data_type: NUMBER
      - name: returned_items_count
        description: Number of items in the order that were returned (SUM of is_returned over items).
        data_type: NUMBER

      # ─── Derived return flags ────────────────────────────────
      - name: is_fully_returned
        description: TRUE if every item in the order was returned (items_count = returned_items_count).
        data_type: BOOLEAN
      - name: is_partially_returned
        description: TRUE if at least one but not all items were returned. FALSE if 0 returns or all returns.
        data_type: BOOLEAN

      # ─── Aggregated financials ───────────────────────────────
      - name: total_revenue_gross
        description: SUM(sale_price) over the items. Gross revenue, before netting returns.
        data_type: FLOAT
      - name: total_revenue_net
        description: SUM(net_revenue) over the items. The Finance-headline revenue metric, net of returns.
        data_type: FLOAT
      - name: total_cost
        description: SUM(cost) over the items.
        data_type: FLOAT
      - name: total_gross_margin
        description: SUM(gross_margin) over the items. total_revenue_net - total_cost.
        data_type: FLOAT
      - name: gross_margin_rate
        description: total_gross_margin / total_revenue_net. NULL when net revenue is 0 (fully-returned orders) to avoid division-by-zero.
        data_type: FLOAT

      # ─── Aggregated averages ─────────────────────────────────
      - name: average_item_price
        description: AVG(sale_price) over the items in the order.
        data_type: FLOAT

      # ─── Audit columns (regenerated at mart-build time) ──────────
      - name: _loaded_at
        description: Timestamp when this row was materialised into `fct_orders`.
        data_type: TIMESTAMP_LTZ
      - name: _dbt_invocation_id
        description: Unique dbt invocation ID for the mart-build that produced this row.
        data_type: VARCHAR
