version: 2

models:
  - name: dim_users
    description: >
      Conformed user dimension. One row per user identified by `user_id`.
      Consumed by Finance, Marketing, and Operations marts as well as BI
      tools (Cube, Metabase, Evidence). PII columns (first_name, last_name,
      email, street_address) are already pseudonymised at the staging layer
      via SHA-256 + salt — no plaintext PII ever lands in the marts layer.

    config:
      contract:
        enforced: true

    columns:
      # ─── Primary key ─────────────────────────────────────────
      - name: user_id
        description: Natural primary key of the user, propagated from `stg_segment__users.user_id`.
        data_type: NUMBER
        data_tests:
          - not_null
          - unique

      # ─── PII (pseudonymised upstream) ──────────────────────────
      - name: first_name
        description: PII (first name), pseudonymised SHA-256 + salt.
        data_type: VARCHAR
      - name: last_name
        description: PII (last name), pseudonymised SHA-256 + salt.
        data_type: VARCHAR
      - name: email
        description: PII (email), pseudonymised SHA-256 + salt. Deterministic — joinable across pseudonymised tables sharing the same salt.
        data_type: VARCHAR
      - name: street_address
        description: PII (street address), pseudonymised SHA-256 + salt.
        data_type: VARCHAR

      # ─── Demographic attributes ──────────────────────────────────
      - name: age
        description: Age at registration, in years.
        data_type: NUMBER
      - name: gender
        description: Self-reported gender (`F`, `M`, or NULL).
        data_type: VARCHAR

      # ─── Geo attributes ─────────────────────────────────────────
      - name: state
        description: US state name.
        data_type: VARCHAR
      - name: postal_code
        description: ZIP code.
        data_type: VARCHAR
      - name: city
        description: City name.
        data_type: VARCHAR
      - name: country
        description: ISO 3166-1 alpha-2 country code.
        data_type: VARCHAR
      - name: latitude
        description: Geo-coordinate of the registered address.
        data_type: FLOAT
      - name: longitude
        description: Geo-coordinate of the registered address.
        data_type: FLOAT

      # ─── Acquisition ─────────────────────────────────────────────
      - name: traffic_source
        description: Acquisition channel at registration (e.g., Email, Facebook, Organic, Search).
        data_type: VARCHAR

      # ─── Business timestamp ─────────────────────────────────────
      - name: registered_at
        description: User registration timestamp. Source of truth for "when did this user sign up".
        data_type: TIMESTAMP_TZ
        data_tests:
          - not_null

      # ─── Audit columns (regenerated at mart-build time) ──────────
      - name: _loaded_at
        description: Timestamp when this row was materialised into `dim_users` (mart-build time, not propagated from staging).
        data_type: TIMESTAMP_LTZ
      - name: _dbt_invocation_id
        description: Unique dbt invocation ID for the mart-build that produced this row.
        data_type: VARCHAR

  - name: dim_products
    description: >
      Conformed product dimension. One row per product (SKU) identified by
      `product_id`. Consumed by Finance, Marketing, and Operations marts
      and BI tools. Holds the catalogue attributes (category, brand,
      department, SKU) plus the financials needed for margin / revenue
      calculations downstream (cost, retail_price).

    config:
      contract:
        enforced: true

    columns:
      # ─── Primary key ─────────────────────────────────────────
      - name: product_id
        description: Natural primary key of the product, propagated from `stg_akeneo__products.product_id`.
        data_type: NUMBER
        data_tests:
          - not_null
          - unique

      # ─── Financials ──────────────────────────────────────────
      - name: cost
        description: Product cost of goods (USD).
        data_type: FLOAT
      - name: retail_price
        description: Suggested retail price (USD).
        data_type: FLOAT

      # ─── Categorical attributes ──────────────────────────────
      - name: category
        description: Product category (e.g., "Sleep & Lounge", "Activewear").
        data_type: VARCHAR
      - name: name
        description: Product display name.
        data_type: VARCHAR
      - name: brand
        description: Product brand.
        data_type: VARCHAR
      - name: department
        description: Top-level department (e.g., "Women", "Men").
        data_type: VARCHAR
      - name: sku
        description: Stock-Keeping Unit code — uniquely identifies a sellable variant.
        data_type: VARCHAR
        # Verify unique SKUs on first build:
        # data_tests:
        #   - unique

      # ─── Foreign key ─────────────────────────────────────────
      - name: distribution_center_id
        description: Foreign key to the distribution center where this product is stocked.
        data_type: NUMBER

      # ─── Audit columns (regenerated at mart-build time) ──────────
      - name: _loaded_at
        description: Timestamp when this row was materialised into `dim_products` (mart-build time, not propagated from staging).
        data_type: TIMESTAMP_LTZ
      - name: _dbt_invocation_id
        description: Unique dbt invocation ID for the mart-build that produced this row.
        data_type: VARCHAR

  - name: dim_dates
    description: >
      Conformed date dimension. Synthetic — no upstream source. Generated
      via `dbt_utils.date_spine` covering 2023-01-01 (project cutoff) to
      `current_date() + 2 years`. Re-built on every `dbt run` so the
      end_date stays fresh. Joined by every fct table on `date_day`.

    config:
      contract:
        enforced: true

    columns:
      # ─── Primary key ─────────────────────────────────────────
      - name: date_day
        description: Calendar day. Primary key of the dimension.
        data_type: DATE
        data_tests:
          - not_null
          - unique

      # ─── Atomic calendar components ──────────────────────────
      - name: year
        description: Calendar year (e.g., 2024).
        data_type: NUMBER
      - name: quarter
        description: Calendar quarter (1, 2, 3, or 4).
        data_type: NUMBER
      - name: month
        description: Calendar month (1-12).
        data_type: NUMBER
      - name: day
        description: Day of the month (1-31).
        data_type: NUMBER
      - name: day_of_week
        description: Day of the week per Snowflake DAYOFWEEK convention (0 = Sunday, 6 = Saturday).
        data_type: NUMBER
      - name: day_of_year
        description: Day of the year (1-366, accounts for leap years).
        data_type: NUMBER

      # ─── Composite BI-friendly attributes ────────────────────
      - name: year_month
        description: ISO-style year-month string (e.g., "2024-01"). Useful for grouping in BI tools.
        data_type: VARCHAR
      - name: year_quarter
        description: Year-quarter string (e.g., "2024-Q1"). Useful for executive reporting.
        data_type: VARCHAR

      # ─── Behavioural flags ───────────────────────────────────
      - name: is_weekend
        description: True if the day is Saturday or Sunday (Snowflake DAYOFWEEK = 0 or 6).
        data_type: BOOLEAN
