# CI profile for dbt docs generation in GitHub Actions.
#
# This profile uses real Snowflake credentials passed via GitHub Secrets
# (env vars resolved by env_var() Jinja). It connects to ANALYTICS_DEV
# and inspects the dev schemas (dbt_gm_staging, dbt_gm_marts) already
# populated by the developer's local dbt runs. No materialization happens
# in CI — `dbt docs generate` is read-only.
#
# The 5 secrets required (set under GitHub repo settings -> Secrets):
#   SNOWFLAKE_ACCOUNT      e.g. FWKNTAH-TG96638
#   SNOWFLAKE_USER         e.g. USER_DBT
#   SNOWFLAKE_ROLE         e.g. ROLE_TRANSFORM
#   SNOWFLAKE_WAREHOUSE    e.g. TRANSFORM_WH
#   SNOWFLAKE_PRIVATE_KEY  PEM content of USER_DBT private key file
#
# Real connection profile for local dev lives at ~/.dbt/profiles.yml
# (see transformation/profiles.yml.example for the canonical template).

thelook:
  target: ci
  outputs:
    ci:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      database: ANALYTICS_DEV
      schema: dbt_gm
      private_key: "{{ env_var('SNOWFLAKE_PRIVATE_KEY') }}"
      threads: 1
      client_session_keep_alive: false
