#cloud-config
# Bootstrap for the OCI ARM A1 VM hosting the always-on platform.
# Applied once on first boot — subsequent changes happen over Bastion SSH.
#
# Important: this file deliberately does NOT manage iptables.
# The Oracle Ubuntu OCI image ships with a sensible iptables default
# (INPUT policy ACCEPT, explicit ACCEPT for tcp/22, generic REJECT at the
# end of INPUT). Replacing that ruleset via `iptables-restore` from
# cloud-init proved fragile on ARM (interactive dpkg-reconfigure on
# iptables-persistent, ordering issues with `write_files` vs `runcmd`),
# and we already have two layers of defense in depth without it:
#   - OCI Security List at the VCN/subnet level (network layer).
#   - fail2ban at the application layer (sshd brute-force mitigation).
# A custom iptables ruleset can be re-introduced later in a dedicated
# commit + ADR if a specific need arises.

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - fail2ban
  - unattended-upgrades
  - rsync
  - git

users:
  # `- default` MUST be present, otherwise cloud-init REPLACES the
  # distribution default user list (which includes `ubuntu` on the OCI
  # Ubuntu image) with whatever follows. Without it, the `ubuntu` user
  # is never created and `metadata.ssh_authorized_keys` (set in
  # compute.tf) has no target — SSH then fails with "Permission denied".
  - default
  - name: deploy
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    # SSH keys for `deploy` are deployed via OCI Bastion sessions at first login,
    # not baked into the image.

write_files:
  # Enable unattended security upgrades on a daily schedule.
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

runcmd:
  # ── Docker Engine + Compose plugin ─────────────────────────
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
    https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
    | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker

  # ── fail2ban ──────────────────────────────────────────────
  - systemctl enable --now fail2ban

  # ── Create deploy workspace ───────────────────────────────
  - mkdir -p /opt/thelook
  - chown deploy:deploy /opt/thelook

final_message: "Bootstrap complete. Access via OCI Bastion as ubuntu, then `sudo -u deploy bash` and clone the Docker Compose stack into /opt/thelook."
