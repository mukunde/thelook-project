#cloud-config
# DEBUG VERSION — minimal cloud-init to validate SSH via OCI Bastion.
# Once SSH is confirmed working, additional bootstrap (Docker, fail2ban,
# iptables, package_upgrade, deploy user) is re-introduced incrementally
# in separate commits so any regression is immediately bisectable.
#
# This file is intentionally minimal:
#   - No package_upgrade (apt-get upgrade can take 5+ min on ARM)
#   - No iptables (default Ubuntu = INPUT ACCEPT, SSH naturally reachable)
#   - No Docker (re-added in a follow-up commit)
#   - No fail2ban (re-added in a follow-up commit)
#   - No deploy user (re-added in a follow-up commit)
#
# The only thing this does: nothing. Ubuntu image already has sshd
# configured for the `ubuntu` user with the SSH key from var.ssh_public_key
# (injected via OCI metadata.ssh_authorized_keys, not via cloud-init).
#
# Expected boot time before sshd is reachable: ~30s.

final_message: "Minimal bootstrap complete. SSH should be reachable as ubuntu@<vm>."
