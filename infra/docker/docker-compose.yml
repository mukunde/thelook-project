# Always-on stack for the OCI VM.
#
# Design notes:
#   - Only Caddy exposes ports to the host (80/443). Everything else is on
#     internal networks, reachable only through Caddy.
#   - Dagster and Metabase have separate Postgres instances to keep their
#     lifecycles independent (image upgrades, DB wipes).
#   - Named volumes (not bind mounts) for easier backup via rclone.
#   - Image tags pinned to majors; review before bumping.

name: thelook

networks:
  edge:
    # Caddy <-> public-facing services
    driver: bridge
  dagster:
    # Dagster webserver <-> daemon <-> postgres
    driver: bridge
    internal: true
  metabase:
    # Metabase <-> its postgres
    driver: bridge
    internal: true

volumes:
  caddy_data:
  caddy_config:
  dagster_postgres_data:
  dagster_home:
  metabase_postgres_data:
  metabase_data:

services:
  # ── Reverse proxy + TLS ────────────────────────────────
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DAGSTER_DOMAIN: ${DAGSTER_DOMAIN}
      METABASE_DOMAIN: ${METABASE_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      DAGSTER_BASIC_AUTH_USER: ${DAGSTER_BASIC_AUTH_USER}
      DAGSTER_BASIC_AUTH_HASH: ${DAGSTER_BASIC_AUTH_HASH}
    networks:
      - edge

  # ── Dagster ─────────────────────────────────────────────
  dagster-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DAGSTER_DB_USER}
      POSTGRES_PASSWORD: ${DAGSTER_DB_PASSWORD}
      POSTGRES_DB: ${DAGSTER_DB_NAME}
    volumes:
      - dagster_postgres_data:/var/lib/postgresql/data
    networks:
      - dagster
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DAGSTER_DB_USER} -d ${DAGSTER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dagster-webserver:
    image: dagster/dagster-celery-k8s:1.8.8
    restart: unless-stopped
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "/opt/dagster/workspace.yaml"]
    environment:
      DAGSTER_POSTGRES_USER: ${DAGSTER_DB_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_DB_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_DB_NAME}
      DAGSTER_POSTGRES_HOSTNAME: dagster-postgres
      DAGSTER_HOME: /opt/dagster/dagster_home
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      # The Dagster code location (workspace.yaml + user code) is mounted
      # from the repo deployed to /opt/thelook/orchestration/ in a later
      # iteration. Placeholder path below — adjust when orchestration/ lands.
      - ./dagster-workspace:/opt/dagster/workspace:ro
    depends_on:
      dagster-postgres:
        condition: service_healthy
    networks:
      - dagster
      - edge

  dagster-daemon:
    image: dagster/dagster-celery-k8s:1.8.8
    restart: unless-stopped
    command: ["dagster-daemon", "run"]
    environment:
      DAGSTER_POSTGRES_USER: ${DAGSTER_DB_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_DB_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_DB_NAME}
      DAGSTER_POSTGRES_HOSTNAME: dagster-postgres
      DAGSTER_HOME: /opt/dagster/dagster_home
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - ./dagster-workspace:/opt/dagster/workspace:ro
    depends_on:
      dagster-postgres:
        condition: service_healthy
    networks:
      - dagster

  # ── Metabase ────────────────────────────────────────────
  metabase-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${METABASE_DB_USER}
      POSTGRES_PASSWORD: ${METABASE_DB_PASSWORD}
      POSTGRES_DB: ${METABASE_DB_NAME}
    volumes:
      - metabase_postgres_data:/var/lib/postgresql/data
    networks:
      - metabase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METABASE_DB_USER} -d ${METABASE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:v0.50.20
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: metabase-postgres
      MB_DB_PORT: 5432
      MB_DB_USER: ${METABASE_DB_USER}
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_DBNAME: ${METABASE_DB_NAME}
      MB_SITE_URL: https://${METABASE_DOMAIN}
      # Metabase needs the reverse-proxied host to generate correct URLs.
      MB_ADMIN_EMAIL: ${ACME_EMAIL}
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      metabase-postgres:
        condition: service_healthy
    networks:
      - metabase
      - edge
