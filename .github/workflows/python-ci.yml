name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy .
        # Will report "no files to check" while the repo is scaffolding-only.
        # The step still runs to validate the mypy config itself.
        continue-on-error: true

      - name: pytest
        run: uv run pytest
        # Same caveat as mypy: no tests yet. Kept wired so adding the first
        # test file is a one-line change.
        continue-on-error: true
