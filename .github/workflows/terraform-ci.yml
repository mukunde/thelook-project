name: Terraform CI

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        module: [snowflake, oci]

    defaults:
      run:
        working-directory: infra/terraform/${{ matrix.module }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.53.0

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        # `-backend=false` skips the Terraform Cloud remote state init —
        # we only need providers for validate.
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate -no-color

      - name: tflint init
        run: tflint --init

      - name: tflint
        run: tflint --recursive
