name: dbt docs (deploy to GitHub Pages)

# Generates dbt's lineage + documentation site and publishes it to the
# gh-pages branch. The site is then served at the project's GitHub Pages
# URL (see README "Live surfaces" section).
#
# No Snowflake credentials needed: we pass --empty-catalog to
# `dbt docs generate`, which skips the catalog generation step (column
# types, row counts) but keeps everything else (lineage, descriptions,
# tests, sources). The dummy profile at transformation/.dbt-ci/profiles.yml
# satisfies dbt's profile-parsing layer without an actual connection.

on:
  push:
    branches: [main]
    paths:
      - 'transformation/**'
      - 'ingestion/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/dbt-docs.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dbt-docs
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build dbt docs and deploy to GitHub Pages
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/transformation/.dbt-ci
      # Dummy value for the pseudonymisation salt: the `pseudonymise()` macro
      # reads DBT_PSEUDONYMISATION_SALT via env_var() with no fallback (fail-fast
      # design in dev). dbt parse evaluates ALL macros even when --empty-catalog
      # is passed, so the env var must be present in CI. The actual value is
      # irrelevant here because --empty-catalog skips the Snowflake hit, so the
      # SQL generated with this dummy salt is never executed against the warehouse.
      DBT_PSEUDONYMISATION_SALT: ci-docs-generation-dummy-never-executed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install workspace deps (root + ingestion + transformation)
        run: uv sync --all-packages

      - name: Install dbt packages
        working-directory: transformation
        run: uv run dbt deps

      - name: Generate dbt docs (empty catalog + no cache pre-warm, no Snowflake hit)
        working-directory: transformation
        # Two flags are required to truly skip every Snowflake hit:
        #   --no-populate-cache : skip the startup `show objects in <schema>`
        #                          warehouse-cache pre-warm. Without this dbt
        #                          tries to list relations even before any
        #                          compile or catalog query.
        #   --empty-catalog     : skip the catalog generation step (SELECT on
        #                          tables for column types / stats).
        # Together they let dbt generate index.html + manifest.json without
        # ever opening a real Snowflake session.
        run: uv run dbt --no-populate-cache docs generate --empty-catalog
        env:
          DBT_LOG_LEVEL: debug

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: transformation/target
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy dbt docs from ${{ github.sha }}"
