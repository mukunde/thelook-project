name: dbt docs (deploy to GitHub Pages)

# Generates dbt's lineage + documentation site and publishes it to the
# gh-pages branch. The site is then served at the project's GitHub Pages
# URL (see README "Live surfaces" section).
#
# No Snowflake credentials needed: we pass --empty-catalog to
# `dbt docs generate`, which skips the catalog generation step (column
# types, row counts) but keeps everything else (lineage, descriptions,
# tests, sources). The dummy profile at transformation/.dbt-ci/profiles.yml
# satisfies dbt's profile-parsing layer without an actual connection.

on:
  push:
    branches: [main]
    paths:
      - 'transformation/**'
      - 'ingestion/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/dbt-docs.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dbt-docs
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build dbt docs and deploy to GitHub Pages
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/transformation/.dbt-ci
      # Snowflake credentials passed from repo secrets. Used by the CI profile
      # at transformation/.dbt-ci/profiles.yml via env_var() Jinja calls.
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      # Dummy value for the pseudonymisation salt: the `pseudonymise()` macro
      # reads DBT_PSEUDONYMISATION_SALT via env_var() with no fallback (fail-fast
      # design in dev). dbt parse evaluates ALL macros at startup, so the env
      # var must be present in CI. The actual value is irrelevant for docs
      # generation since `dbt docs generate` does not materialise anything
      # (it's read-only against the warehouse).
      DBT_PSEUDONYMISATION_SALT: ci-docs-generation-dummy-never-executed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install workspace deps (root + ingestion + transformation)
        run: uv sync --all-packages

      - name: Install dbt packages
        working-directory: transformation
        run: uv run dbt deps

      - name: Generate dbt docs (static + no cache pre-warm)
        working-directory: transformation
        # Two flags:
        #   --no-populate-cache : skip the startup `show objects in <schema>`
        #                          warehouse-cache pre-warm. Saves a couple of
        #                          seconds; the docs build doesn't need the
        #                          cache.
        #   --static            : produce `static_index.html`, a single-file
        #                          HTML viewer with all assets and the manifest
        #                          embedded. Without this, dbt 1.8+ only writes
        #                          the JSON artifacts and expects an external
        #                          viewer.
        # `--empty-catalog` removed: now that we have real Snowflake credentials
        # in CI, we want the full catalog (column types, stats) embedded in the
        # rendered docs. dbt docs generate is read-only (no materialization), so
        # safe to run against ANALYTICS_DEV.
        run: uv run dbt --no-populate-cache docs generate --static

      - name: Inspect target/ contents (debug)
        working-directory: transformation
        run: ls -la target/

      - name: Rename static_index.html to index.html for GitHub Pages
        working-directory: transformation
        # GitHub Pages serves /index.html at the root of the published dir.
        # dbt produces `static_index.html`, so we rename it. Fail loudly if
        # dbt didn't produce the file, since the deploy would be broken.
        run: |
          if [ -f target/static_index.html ]; then
            mv target/static_index.html target/index.html
            echo "Renamed static_index.html to index.html"
          else
            echo "ERROR: target/static_index.html not found after dbt docs generate --static"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: transformation/target
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy dbt docs from ${{ github.sha }}"
