# Pre-commit hooks — run automatically on `git commit`.
#
# Install (one-time, on each developer workstation):
#   uv tool install pre-commit           # or: pipx install pre-commit
#   pre-commit install                   # registers the git hook in .git/hooks/pre-commit
#
# Run manually across the whole repo:
#   pre-commit run --all-files
#
# Update pinned versions:
#   pre-commit autoupdate

repos:
  # ─── Secret scanning (primary safety net) ───────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (detect committed secrets)
        description: Scan staged diffs for API keys, tokens, and credentials.

  # ─── Basic hygiene ──────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ─── Python: ruff lint + format (config read from pyproject.toml) ───
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ─── Terraform: fmt + validate ──────────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl

  # ─── SQL (dbt models) — light format check ──────────────
  # Uncomment once dbt models land in the repo.
  # - repo: https://github.com/sqlfluff/sqlfluff
  #   rev: 3.2.5
  #   hooks:
  #     - id: sqlfluff-lint
  #       args: [--dialect, snowflake]
